name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx eslint . --max-warnings 0
        continue-on-error: true  # ESLint may have warnings in initial setup

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx vitest run --reporter=verbose
    env:
      AUTH_SECRET: ci-test-secret-that-is-long-enough-for-validation
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
    env:
      AUTH_SECRET: ci-build-secret-that-is-long-enough-for-validation
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/builddb
